openapi: 3.1.0
info:
  title: Swapl API
  version: 0.1.0
  description: >-
    Shared contract for the Swapl home-swap API consumed by the web (Next.js),
    iOS, and Android clients. Server-authoritative: every platform calls this
    one API, which owns the single Postgres database. Schemas mirror the
    client DTOs proven to decode the live responses today.
servers:
  - url: http://localhost:3000
    description: Local dev
  - url: https://swapl.fun
    description: Production

tags:
  - name: auth
  - name: me
  - name: profile
  - name: listings
  - name: favorites
  - name: saved-searches
  - name: proposals
  - name: reports
  - name: devices
  - name: verification
  - name: waitlist
  - name: discover
  - name: assistant
  - name: ai
  - name: agreements
  - name: billing
  - name: insurance
  - name: concierge
  - name: corporate
  - name: affiliate
  - name: marketing
  - name: uploads
  - name: i18n

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: Opaque token from POST /api/auth/token (native clients).
    cookieAuth:
      type: apiKey
      in: cookie
      name: swapl_session
      description: Signed session cookie (web).

  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error: { type: string }
        message: { type: string }

    HomeGuide:
      type: object
      description: A listing's home guide. All fields optional; completeness is derived over a core subset.
      properties:
        accessInstructions: { type: string, nullable: true }
        keyPickup: { type: string, nullable: true }
        wifiName: { type: string, nullable: true }
        wifiPassword: { type: string, nullable: true }
        heatingCooling: { type: string, nullable: true }
        kitchen: { type: string, nullable: true }
        bins: { type: string, nullable: true }
        petsPlants: { type: string, nullable: true }
        houseRules: { type: string, nullable: true }
        neighbourhood: { type: string, nullable: true }
        emergencyContact: { type: string, nullable: true }
        updatedAt: { type: string, format: date-time }
        completeness: { type: integer, description: '0..100 over the core field set' }
        complete: { type: boolean }

    HomeGuideUpdate:
      type: object
      description: Partial upsert. Provide only the fields to change; null clears a field.
      properties:
        accessInstructions: { type: string, nullable: true }
        keyPickup: { type: string, nullable: true }
        wifiName: { type: string, nullable: true }
        wifiPassword: { type: string, nullable: true }
        heatingCooling: { type: string, nullable: true }
        kitchen: { type: string, nullable: true }
        bins: { type: string, nullable: true }
        petsPlants: { type: string, nullable: true }
        houseRules: { type: string, nullable: true }
        neighbourhood: { type: string, nullable: true }
        emergencyContact: { type: string, nullable: true }

    HomeGuideResponse:
      type: object
      required: [isOwner, locked]
      properties:
        isOwner: { type: boolean }
        locked: { type: boolean, description: 'true when a gated counterparty may not yet read the guide' }
        unlocksAt: { type: string, format: date-time, description: 'present when locked — when the reveal gate opens' }
        guide:
          oneOf:
            - { $ref: '#/components/schemas/HomeGuide' }
            - { type: 'null' }

    CheckEventRequest:
      type: object
      description: Optional note + already-uploaded photo URLs.
      properties:
        note: { type: string, maxLength: 2000 }
        photos:
          type: array
          items: { type: string, format: uri }
          maxItems: 12

    CheckEvent:
      type: object
      required: [id, type, photos, createdAt]
      properties:
        id: { type: string }
        userId: { type: string }
        type: { type: string, enum: [checkin, checkout] }
        note: { type: string, nullable: true }
        photos: { type: array, items: { type: string, format: uri } }
        createdAt: { type: string, format: date-time }
        mine: { type: boolean }

    CheckEventResponse:
      type: object
      required: [ok, event]
      properties:
        ok: { type: boolean }
        duplicate: { type: boolean, description: 'true when the party had already checked in/out' }
        event: { $ref: '#/components/schemas/CheckEvent' }

    DisputeCreateRequest:
      type: object
      required: [category, description]
      description: >-
        Open a dispute on a swap. category safety|access is treated as urgent
        and clients should foreground the 24/7 line. Photos must already be
        uploaded via /api/uploads/listing-photo.
      properties:
        category:
          type: string
          enum: [access, damage, cleanliness, safety, no_show, other]
        description: { type: string, minLength: 1, maxLength: 4000 }
        photos:
          type: array
          items: { type: string, format: uri }
          maxItems: 12

    DisputeMessage:
      type: object
      required: [id, authorId, body, photos, createdAt]
      properties:
        id: { type: string }
        authorId: { type: string }
        authorName: { type: string, nullable: true }
        body: { type: string }
        photos: { type: array, items: { type: string, format: uri } }
        createdAt: { type: string, format: date-time }

    Dispute:
      type: object
      required: [id, category, urgent, status, description, photos, createdAt]
      properties:
        id: { type: string }
        category:
          type: string
          enum: [access, damage, cleanliness, safety, no_show, other]
        urgent: { type: boolean, description: 'true for safety|access — foreground the 24/7 line' }
        status:
          type: string
          enum: [open, investigating, awaiting_response, resolved, closed]
        description: { type: string }
        photos: { type: array, items: { type: string, format: uri } }
        resolution: { type: string, nullable: true }
        openedBy:
          type: object
          properties:
            id: { type: string }
            name: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        messages:
          type: array
          items: { $ref: '#/components/schemas/DisputeMessage' }

    DisputeCreateResponse:
      type: object
      required: [ok, dispute]
      properties:
        ok: { type: boolean }
        dispute: { $ref: '#/components/schemas/Dispute' }

    DisputeListResponse:
      type: object
      required: [disputes]
      properties:
        disputes:
          type: array
          items: { $ref: '#/components/schemas/Dispute' }

    DisputeMessageRequest:
      type: object
      required: [body]
      description: >-
        Add a message to an open dispute. A party reply nudges status to
        investigating; an admin reply nudges it to awaiting_response. Photos
        must already be uploaded via /api/uploads/listing-photo.
      properties:
        body: { type: string, minLength: 1, maxLength: 4000 }
        photos:
          type: array
          items: { type: string, format: uri }
          maxItems: 12

    DisputeMessageResponse:
      type: object
      required: [ok, status, message]
      properties:
        ok: { type: boolean }
        status:
          type: string
          enum: [open, investigating, awaiting_response, resolved, closed]
        message: { $ref: '#/components/schemas/DisputeMessage' }

    TripCockpitResponse:
      type: object
      required: [agreementId, phase, dates, addressUnlocked, checklist, checkEvents]
      properties:
        agreementId: { type: string }
        proposalId: { type: string }
        phase: { type: string, enum: [AGREED, PREPARING, READY, IN_PROGRESS, COMPLETED, INTERRUPTED] }
        role: { type: string, enum: [host1, host2] }
        dates:
          type: object
          properties:
            from: { type: string, format: date-time }
            to: { type: string, format: date-time }
        countdown:
          type: object
          properties:
            days: { type: integer }
            hours: { type: integer }
        keyCodes:
          type: object
          properties:
            mine: { type: string, nullable: true }
        insurance:
          nullable: true
          type: object
          properties:
            policyNumber: { type: string }
            coverageAmount: { type: integer }
            status: { type: string }
            expiresAt: { type: string, format: date-time }
        addressUnlocked: { type: boolean }
        otherAddress: { type: string, nullable: true, description: 'only present once the reveal gate is open' }
        otherCity: { type: string }
        otherGuide:
          description: 'the other home guide once unlocked, else { locked, unlocksAt }'
          oneOf:
            - { $ref: '#/components/schemas/HomeGuide' }
            - type: object
              properties:
                locked: { type: boolean }
                unlocksAt: { type: string, format: date-time }
            - { type: 'null' }
        myGuideCompleteness: { type: integer }
        otherGuideCompleteness: { type: integer }
        checklist:
          type: object
          properties:
            guideFilled: { type: boolean }
            detailsRead: { type: boolean }
            checkedIn: { type: boolean }
            checkedOut: { type: boolean }
        checkEvents:
          type: array
          items: { $ref: '#/components/schemas/CheckEvent' }

    AuthUser:
      type: object
      required: [id, email]
      properties:
        id: { type: string }
        email: { type: string, format: email }
        name: { type: string, nullable: true }
        avatar: { type: string, nullable: true }

    TokenRequest:
      type: object
      required: [email, password, platform]
      properties:
        email: { type: string, format: email }
        password: { type: string, minLength: 6 }
        platform: { $ref: '#/components/schemas/Platform' }
        appVersion: { type: string }

    TokenResponse:
      type: object
      required: [token, expiresAt, user]
      properties:
        token: { type: string }
        expiresAt: { type: string, format: date-time }
        user: { $ref: '#/components/schemas/AuthUser' }

    RegisterRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string, minLength: 6 }
        platform:
          $ref: '#/components/schemas/Platform'
          description: When set, the response also includes a bearer token (single round-trip native sign-up).
        appVersion: { type: string }
        turnstileToken: { type: string, description: Cloudflare Turnstile token (web). }
        attestation: { type: string, description: App Attest / Play Integrity token (native). }

    RegisterResponse:
      type: object
      required: [ok, userId]
      properties:
        ok: { type: boolean }
        userId: { type: string }
        token: { type: string, description: Present only for native platforms. }
        expiresAt: { type: string, format: date-time }

    RefreshResponse:
      type: object
      required: [token, expiresAt]
      properties:
        token: { type: string }
        expiresAt: { type: string, format: date-time }

    OkResponse:
      type: object
      required: [ok]
      properties:
        ok: { type: boolean }
        alreadyVerified: { type: boolean }

    TravelProfile:
      type: object
      required: [summary, traits, sourcesUsed, updatedAt]
      properties:
        summary: { type: string, description: 'Human-readable synthesis, shown verbatim to the user' }
        traits:
          type: object
          required: [themes, cities, constraints]
          properties:
            themes:
              type: array
              items: { type: string }
            cities:
              type: array
              items: { type: string }
            vibe: { type: string, nullable: true }
            constraints:
              type: array
              items: { type: string }
        sourcesUsed:
          type: array
          description: 'In-app signals that fed the synthesis, e.g. interests, favorites, saved_searches, swap_messages'
          items: { type: string }
        updatedAt: { type: string, format: date-time }

    InspireCandidate:
      type: object
      required: [listingId, city, country, title, matchScore]
      properties:
        listingId: { type: string }
        city: { type: string }
        country: { type: string }
        title: { type: string }
        photo: { type: string, nullable: true }
        matchScore: { type: integer, description: '0..100, match engine + wishlist/profile boosts' }

    InspireItemFlags:
      type: object
      description: Every package item is individually toggleable via PATCH /api/assistant/inspire/{id}/items.
      required: [id, selected]
      properties:
        id: { type: string, description: 'Stable item id within the package (exp-N, svc-{slug}, addon-{slug})' }
        selected: { type: boolean, description: 'true by default; confirm/charge read the current selection' }

    InspireInterpreted:
      type: object
      description: >-
        What was understood from the spoken/free-text prompt ("Understood:
        Lisbon, Sep 5-15, pet-friendly"). Explicit filters always win over the
        extraction.
      required: [source]
      properties:
        dateFrom: { type: string, description: 'yyyy-MM-dd' }
        dateTo: { type: string, description: 'yyyy-MM-dd' }
        city: { type: string, description: 'Canonical city name from the active listings' }
        constraints:
          type: array
          items: { type: string, description: 'pet-friendly | wfh | step-free' }
        source: { type: string, description: 'ai | heuristic — how the prompt was parsed' }

    InspireAddOnItem:
      allOf:
        - { $ref: '#/components/schemas/InspireItemFlags' }
        - type: object
          description: >-
            A swapl concierge add-on offered inside the package — the ONLY
            payable items. Charged off-session only after the host accepts.
          required: [slug, name, description, priceCents, currency, provider, category]
          properties:
            slug: { type: string }
            name: { type: string }
            description: { type: string }
            priceCents: { type: integer }
            currency: { type: string }
            provider: { type: string }
            category: { type: string }

    InspirePackage:
      type: object
      required: [packageId, myListingId, destination, alternatives, dates, proposalMessage, experiences, services, addOns]
      properties:
        packageId: { type: string }
        myListingId: { type: string }
        destination:
          allOf:
            - { $ref: '#/components/schemas/InspireCandidate' }
            - type: object
              required: [why]
              properties:
                why: { type: string, description: 'Why this fits you — 2 sentences' }
        alternatives:
          type: array
          items: { $ref: '#/components/schemas/InspireCandidate' }
        dates:
          type: object
          required: [from, to, source]
          properties:
            from: { type: string, description: 'yyyy-MM-dd' }
            to: { type: string, description: 'yyyy-MM-dd' }
            source: { type: string, description: 'user | interpreted | availability' }
        proposalMessage: { type: string }
        proposalMessageSource: { type: string, description: 'ai | fallback' }
        interpreted:
          oneOf:
            - { $ref: '#/components/schemas/InspireInterpreted' }
          nullable: true
        experiences:
          type: array
          description: 'GetYourGuide cards for the destination city (env-gated, max 3). External links — never charged by swapl.'
          items:
            allOf:
              - { $ref: '#/components/schemas/DiscoverExperience' }
              - { $ref: '#/components/schemas/InspireItemFlags' }
        services:
          type: array
          description: 'Configured affiliate partners (flights, esim, insurance), click-through via /api/affiliate/{partnerSlug}. External links — never charged by swapl.'
          items:
            allOf:
              - { $ref: '#/components/schemas/InspireItemFlags' }
              - type: object
                required: [slug, name, category, url]
                properties:
                  slug: { type: string }
                  name: { type: string }
                  category: { type: string, description: 'flights | esim | insurance' }
                  url: { type: string }
        addOns:
          type: array
          description: 'Concierge add-ons with real prices — the only payable items (pay-on-accept).'
          items: { $ref: '#/components/schemas/InspireAddOnItem' }
        source: { type: string, description: 'ai | fallback — how the destination was picked' }

    Platform:
      type: string
      enum: [ios, android, web-pwa]

    ProvidersResponse:
      type: object
      description: Which login methods are live on this deployment (env-gated). Clients hide buttons for disabled providers.
      required: [password, google, apple, telegram, emailOtp, phone, passkey]
      properties:
        password: { type: boolean }
        google: { type: boolean }
        apple: { type: boolean }
        telegram:
          type: object
          required: [enabled]
          properties:
            enabled: { type: boolean }
            botUsername: { type: string, description: Present when enabled — renders the Login Widget. }
        emailOtp: { type: boolean }
        phone: { type: boolean, description: SMS OTP availability (Twilio configured). }
        passkey: { type: boolean, description: Passkey (WebAuthn) sign-in — always true, needs no external credentials. }

    SessionResponse:
      type: object
      description: Web (cookie) login response — same shape as POST /api/auth/login.
      required: [ok, userId, emailVerified]
      properties:
        ok: { type: boolean }
        userId: { type: string }
        emailVerified: { type: boolean }

    LoginResponse:
      description: TokenResponse when `platform` was sent (native bearer), SessionResponse otherwise (web cookie).
      oneOf:
        - $ref: '#/components/schemas/TokenResponse'
        - $ref: '#/components/schemas/SessionResponse'

    OAuthGoogleRequest:
      type: object
      required: [idToken]
      properties:
        idToken: { type: string, description: Google ID token (JWT) from GIS / GoogleSignIn. }
        platform: { $ref: '#/components/schemas/Platform' }
        appVersion: { type: string }

    OAuthAppleRequest:
      type: object
      required: [identityToken]
      properties:
        identityToken: { type: string, description: Apple identity token (JWT) from Sign in with Apple. }
        fullName: { type: string, description: Apple sends the name only on first authorization; used solely at account creation. }
        platform: { $ref: '#/components/schemas/Platform' }
        appVersion: { type: string }

    OAuthTelegramRequest:
      type: object
      required: [authData]
      properties:
        authData:
          type: object
          description: Raw payload from the Telegram Login Widget (id, auth_date, hash, first_name, username, photo_url, ...).
          additionalProperties: true
        platform: { $ref: '#/components/schemas/Platform' }
        appVersion: { type: string }

    OtpRequestRequest:
      type: object
      required: [channel, destination]
      properties:
        channel: { type: string, enum: [email, sms] }
        destination: { type: string, description: Email address, or phone in E.164 for sms. }

    OtpVerifyRequest:
      type: object
      required: [destination, code]
      properties:
        destination: { type: string }
        code: { type: string, pattern: '^[0-9]{6}$' }
        platform: { $ref: '#/components/schemas/Platform' }
        appVersion: { type: string }

    WebAuthnRegistrationOptions:
      type: object
      description: PublicKeyCredentialCreationOptionsJSON (WebAuthn level 3) — feed to startRegistration()/the platform passkey API verbatim.
      additionalProperties: true

    WebAuthnAuthenticationOptions:
      type: object
      description: PublicKeyCredentialRequestOptionsJSON — usernameless (allowCredentials empty); feed to startAuthentication() verbatim.
      additionalProperties: true

    PasskeyRegisterVerifyRequest:
      type: object
      required: [response]
      properties:
        response:
          type: object
          description: RegistrationResponseJSON from startRegistration() / ASAuthorization / CredentialManager.
          additionalProperties: true
        name: { type: string, description: User-facing label for the credential (e.g. the device model). }

    PasskeyLoginVerifyRequest:
      type: object
      description: AuthenticationResponseJSON fields spread at the top level, plus the usual optional platform/appVersion.
      required: [id, rawId, response, type]
      properties:
        id: { type: string, description: Base64url credential id — resolves the account (usernameless). }
        rawId: { type: string }
        response:
          type: object
          additionalProperties: true
        type: { type: string, enum: [public-key] }
        clientExtensionResults:
          type: object
          additionalProperties: true
        authenticatorAttachment: { type: string }
        platform: { $ref: '#/components/schemas/Platform' }
        appVersion: { type: string }

    PasskeySummary:
      type: object
      required: [id, name, deviceType, backedUp, createdAt, lastUsedAt]
      properties:
        id: { type: string }
        name: { type: string, nullable: true }
        deviceType: { type: string, nullable: true, enum: [singleDevice, multiDevice, null] }
        backedUp: { type: boolean }
        createdAt: { type: string, format: date-time }
        lastUsedAt: { type: string, format: date-time, nullable: true }

    MeResponse:
      type: object
      required: [user, counts]
      properties:
        user:
          type: object
          required: [id, email, verified, role]
          properties:
            id: { type: string }
            email: { type: string, format: email }
            name: { type: string, nullable: true }
            avatar: { type: string, nullable: true }
            bio: { type: string, nullable: true }
            bioVibe: { type: string, nullable: true }
            verified: { type: boolean }
            role: { type: string }
            interests:
              type: array
              items: { type: string }
            createdAt: { type: string, format: date-time }
            work: { type: string, nullable: true }
            languages:
              type: array
              items: { type: string }
            homeCity: { type: string, nullable: true }
            homeCountry: { type: string, nullable: true }
        settings: { $ref: '#/components/schemas/UserSettings' }
        counts:
          type: object
          required: [listings, incomingProposals, outgoingProposals, activeSwaps]
          properties:
            listings: { type: integer }
            incomingProposals: { type: integer }
            outgoingProposals: { type: integer }
            activeSwaps: { type: integer }
        subscription:
          type: object
          nullable: true
          properties:
            planId: { type: string }
            status: { type: string }
            currentPeriodEnd: { type: string, format: date-time }
            cancelAtPeriodEnd: { type: boolean }

    Listing:
      type: object
      required:
        - id
        - userId
        - title
        - description
        - propertyType
        - city
        - neighbourhood
        - country
        - sizeSqm
        - sleeps
        - bedrooms
        - bathrooms
        - hasElevator
        - stepFreeAccess
        - petsAllowed
        - petTypes
        - wfhSetup
        - wfhDesks
        - hasParking
        - bikeIncluded
        - rooftop
        - balcony
        - garden
        - courtyard
        - piano
        - pool
        - ac
        - washer
        - dryer
        - dishwasher
        - availableFrom
        - availableTo
        - minStayDays
        - maxStayDays
        - photos
        - tags
        - palette
        - isFeatured
        - isVerified
      properties:
        id: { type: string }
        userId: { type: string }
        ownerName: { type: string, nullable: true }
        title: { type: string }
        description: { type: string }
        propertyType: { type: string }
        city: { type: string }
        neighbourhood: { type: string }
        country: { type: string }
        sizeSqm: { type: integer }
        sleeps: { type: integer }
        bedrooms: { type: integer }
        bathrooms: { type: integer }
        floor: { type: integer, nullable: true }
        hasElevator: { type: boolean }
        stepFreeAccess: { type: boolean }
        petsAllowed: { type: boolean }
        petTypes:
          type: array
          items: { type: string }
        wfhSetup: { type: boolean }
        wfhDesks: { type: integer }
        hasParking: { type: boolean }
        bikeIncluded: { type: boolean }
        rooftop: { type: boolean }
        balcony: { type: boolean }
        garden: { type: boolean }
        courtyard: { type: boolean }
        piano: { type: boolean }
        pool: { type: boolean }
        ac: { type: boolean }
        washer: { type: boolean }
        dryer: { type: boolean }
        dishwasher: { type: boolean }
        gym: { type: boolean }
        address: { type: string, nullable: true, description: "Street address — only returned to the listing's owner" }
        availableFrom: { type: string, description: 'yyyy-MM-dd' }
        availableTo: { type: string, description: 'yyyy-MM-dd' }
        minStayDays: { type: integer }
        maxStayDays: { type: integer }
        photos:
          type: array
          items: { type: string }
        tags:
          type: array
          items: { type: string }
        palette: { type: string }
        lat: { type: number, format: double, nullable: true }
        lng: { type: number, format: double, nullable: true }
        isFeatured: { type: boolean }
        isVerified: { type: boolean }

    ListingWithScore:
      type: object
      required: [listing, band]
      properties:
        listing: { $ref: '#/components/schemas/Listing' }
        matchScore: { type: integer, nullable: true }
        band: { type: string }

    ListingSearchResponse:
      type: object
      required: [items, page, pageSize, total]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/ListingWithScore' }
        page: { type: integer }
        pageSize: { type: integer }
        total: { type: integer }
        viewerListingId: { type: string, nullable: true }

    Host:
      type: object
      required: [id, verified, memberSince]
      properties:
        id: { type: string }
        name: { type: string, nullable: true }
        avatar: { type: string, nullable: true }
        bio: { type: string, nullable: true }
        bioVibe: { type: string, nullable: true }
        verified: { type: boolean }
        memberSince: { type: string }

    ListingDetailResponse:
      type: object
      required: [listing, host]
      properties:
        listing: { $ref: '#/components/schemas/Listing' }
        host: { $ref: '#/components/schemas/Host' }
        matchScore: { type: integer, nullable: true }
        viewerListingId: { type: string, nullable: true }

    ListingCreateDraft:
      type: object
      required:
        - title
        - description
        - propertyType
        - city
        - neighbourhood
        - country
        - sizeSqm
        - sleeps
        - bedrooms
        - bathrooms
        - availableFrom
        - availableTo
        - minStayDays
        - maxStayDays
        - photos
        - tags
      properties:
        title: { type: string }
        description: { type: string }
        propertyType: { type: string }
        city: { type: string }
        neighbourhood: { type: string }
        country: { type: string }
        address: { type: string, nullable: true }
        lat: { type: number, format: double, nullable: true }
        lng: { type: number, format: double, nullable: true }
        sizeSqm: { type: integer }
        sleeps: { type: integer }
        bedrooms: { type: integer }
        bathrooms: { type: integer }
        floor: { type: integer, nullable: true }
        hasElevator: { type: boolean }
        stepFreeAccess: { type: boolean }
        petsAllowed: { type: boolean }
        petTypes:
          type: array
          items: { type: string }
        wfhSetup: { type: boolean }
        wfhDesks: { type: integer }
        hasParking: { type: boolean }
        bikeIncluded: { type: boolean }
        rooftop: { type: boolean }
        balcony: { type: boolean }
        garden: { type: boolean }
        courtyard: { type: boolean }
        piano: { type: boolean }
        pool: { type: boolean }
        gym: { type: boolean }
        ac: { type: boolean }
        dishwasher: { type: boolean }
        washer: { type: boolean }
        dryer: { type: boolean }
        availableFrom: { type: string }
        availableTo: { type: string }
        minStayDays: { type: integer }
        maxStayDays: { type: integer }
        photos:
          type: array
          items: { type: string }
        tags:
          type: array
          items: { type: string }

    ListingCreateResponse:
      type: object
      required: [ok, id]
      properties:
        ok: { type: boolean }
        id: { type: string }

    FavoritesResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/Listing' }

    FavoriteIdsResponse:
      type: object
      required: [ids]
      properties:
        ids:
          type: array
          items: { type: string }

    FavoriteToggleResponse:
      type: object
      required: [ok, favorited]
      properties:
        ok: { type: boolean }
        favorited: { type: boolean }

    CityAutocompleteItem:
      type: object
      required: [city, country, listings]
      properties:
        city: { type: string }
        country: { type: string }
        listings: { type: integer, description: Count of active listings in this city. }

    CityAutocompleteResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/CityAutocompleteItem' }

    ProposalSummary:
      type: object
      required: [id, status, meSide, dateFrom, dateTo, myCity, myNeighbourhood, theirCity, theirNeighbourhood, updatedAt]
      properties:
        id: { type: string }
        status: { type: string }
        meSide: { type: string }
        dateFrom: { type: string }
        dateTo: { type: string }
        message: { type: string, nullable: true }
        myCity: { type: string }
        myNeighbourhood: { type: string }
        myCoverPhotoUrl: { type: string, nullable: true, description: First photo of your listing }
        theirCity: { type: string }
        theirNeighbourhood: { type: string }
        theirCoverPhotoUrl: { type: string, nullable: true, description: First photo of the other listing }
        otherName: { type: string, nullable: true }
        updatedAt: { type: string, format: date-time }

    InboxResponse:
      type: object
      required: [buckets]
      properties:
        buckets:
          type: object
          required: [waitingOnYou, sent, active, archived]
          properties:
            waitingOnYou:
              type: array
              items: { $ref: '#/components/schemas/ProposalSummary' }
            sent:
              type: array
              items: { $ref: '#/components/schemas/ProposalSummary' }
            active:
              type: array
              items: { $ref: '#/components/schemas/ProposalSummary' }
            archived:
              type: array
              items: { $ref: '#/components/schemas/ProposalSummary' }

    ProposalDraft:
      type: object
      required: [proposerListingId, targetListingId, dateFrom, dateTo]
      properties:
        proposerListingId: { type: string }
        targetListingId: { type: string }
        dateFrom: { type: string }
        dateTo: { type: string }
        message: { type: string, nullable: true }

    ProposalCreateResponse:
      type: object
      required: [id]
      properties:
        ok: { type: boolean }
        id: { type: string }

    ProposalAction:
      type: object
      required: [action]
      properties:
        action:
          type: string
          enum: [accept, decline, counter, withdraw]
        counterDateFrom: { type: string }
        counterDateTo: { type: string }
        counterMessage: { type: string }

    DeviceRegister:
      type: object
      required: [platform, pushToken]
      properties:
        platform: { $ref: '#/components/schemas/Platform' }
        pushToken: { type: string }
        appVersion: { type: string }

    DeviceRegisterResponse:
      type: object
      required: [ok]
      properties:
        ok: { type: boolean }
        deviceId: { type: string }

    PlanLimitError:
      type: object
      required: [error]
      properties:
        error: { type: string, description: Machine-readable reason (e.g. PLAN_LIMIT). }
        upgradeTo: { type: string, description: Plan id that unlocks the feature. }
        currentPlan: { type: string }

    SavedSearch:
      type: object
      required: [id, userId, name, query, alertEnabled, createdAt]
      properties:
        id: { type: string }
        userId: { type: string }
        name: { type: string }
        query: { type: string, description: Serialized URLSearchParams from /listings. }
        alertEnabled: { type: boolean }
        lastNotifiedAt: { type: string, format: date-time, nullable: true }
        createdAt: { type: string, format: date-time }

    SavedSearchesResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/SavedSearch' }

    SavedSearchCreateRequest:
      type: object
      required: [name, query]
      properties:
        name: { type: string, minLength: 2, maxLength: 80 }
        query: { type: string, maxLength: 2000, description: Serialized URLSearchParams from /listings. }
        alertEnabled: { type: boolean, default: true }

    SavedSearchCreateResponse:
      type: object
      required: [ok, id]
      properties:
        ok: { type: boolean }
        id: { type: string }

    InterestTag:
      type: object
      required: [slug, label, category]
      properties:
        slug: { type: string }
        label: { type: string }
        category: { $ref: '#/components/schemas/InterestCategory' }

    InterestCategory:
      type: string
      enum: [food_drink, art_design, music, outdoor, wellness, history, nightlife, family, shopping, work]

    InterestsResponse:
      type: object
      required: [catalog, categories, selected]
      properties:
        catalog:
          type: array
          items: { $ref: '#/components/schemas/InterestTag' }
        categories:
          type: array
          items:
            type: object
            required: [id, label]
            properties:
              id: { $ref: '#/components/schemas/InterestCategory' }
              label: { type: string }
        selected:
          type: array
          items: { type: string }
          description: Slugs currently on the profile; empty when unauthenticated.

    InterestsUpdateRequest:
      type: object
      required: [interests]
      properties:
        interests:
          type: array
          maxItems: 12
          items: { type: string }
          description: Interest slugs; unknown slugs are silently dropped.
        bioVibe: { type: string, maxLength: 160, nullable: true }

    PublicProfile:
      type: object
      required: [id, verified, memberSince, interests]
      properties:
        id: { type: string }
        name: { type: string, nullable: true }
        avatar: { type: string, nullable: true }
        bio: { type: string, nullable: true }
        bioVibe: { type: string, nullable: true }
        verified: { type: boolean }
        memberSince: { type: string, format: date-time }
        interests:
          type: array
          items: { type: string }
        work: { type: string, nullable: true }
        languages:
          type: array
          items: { type: string }
          description: Language codes/names the host speaks.
        homeCity:
          type: string
          nullable: true
          description: Null when the host disabled showHomeCity in their settings.
        homeCountry: { type: string, nullable: true }

    ProfileStats:
      type: object
      required: [swapsCompleted, reviewsCount, avgRating, memberSince]
      properties:
        swapsCompleted: { type: integer }
        reviewsCount: { type: integer }
        avgRating:
          type: number
          nullable: true
          description: Average rating rounded to one decimal; null with no reviews.
        memberSince: { type: string, format: date-time }

    VisitedCity:
      type: object
      required: [city, country, year]
      properties:
        city: { type: string }
        country: { type: string }
        year: { type: integer }

    ProfileReview:
      type: object
      required: [id, author, rating, text, createdAt]
      properties:
        id: { type: string }
        author:
          type: object
          required: [id]
          properties:
            id: { type: string }
            name: { type: string, nullable: true }
            avatar: { type: string, nullable: true }
        rating: { type: integer, minimum: 1, maximum: 5 }
        text: { type: string }
        createdAt: { type: string, format: date-time }

    PublicProfileResponse:
      type: object
      required: [user, stats, visited, reviews, listings]
      properties:
        user: { $ref: '#/components/schemas/PublicProfile' }
        stats: { $ref: '#/components/schemas/ProfileStats' }
        visited:
          type: array
          items: { $ref: '#/components/schemas/VisitedCity' }
          description: >-
            Cities visited via COMPLETED swaps (the other listing's city),
            deduped per city/country/year, newest first.
        reviews:
          type: array
          items: { $ref: '#/components/schemas/ProfileReview' }
          description: Latest 10 reviews received.
        listings:
          type: array
          items: { $ref: '#/components/schemas/Listing' }
          description: The host's active listings, newest first.

    ProfileUpdateRequest:
      type: object
      description: Partial update — only the keys present are touched.
      properties:
        name: { type: string, minLength: 1, maxLength: 80 }
        bio: { type: string, nullable: true, maxLength: 1000 }
        work: { type: string, nullable: true, maxLength: 120 }
        languages:
          type: array
          maxItems: 10
          items: { type: string, maxLength: 40 }
        homeCity: { type: string, nullable: true, maxLength: 80 }
        homeCountry: { type: string, nullable: true, maxLength: 80 }

    ProfileUpdateResponse:
      type: object
      required: [profile]
      properties:
        profile:
          type: object
          required: [work, languages, homeCity, homeCountry]
          properties:
            work: { type: string, nullable: true }
            languages:
              type: array
              items: { type: string }
            homeCity: { type: string, nullable: true }
            homeCountry: { type: string, nullable: true }

    UserSettings:
      type: object
      required: [searchEngineIndexing, showHomeCity, emailNotifications, pushNotifications]
      properties:
        searchEngineIndexing:
          type: boolean
          description: False excludes the user's listings from the sitemap and adds noindex on their listing pages.
        showHomeCity:
          type: boolean
          description: False omits homeCity/homeCountry from the public profile.
        emailNotifications: { type: boolean }
        pushNotifications: { type: boolean }

    UserSettingsResponse:
      type: object
      required: [settings]
      properties:
        settings: { $ref: '#/components/schemas/UserSettings' }

    UserSettingsUpdateRequest:
      type: object
      description: Partial merge — omitted keys keep their current value.
      properties:
        searchEngineIndexing: { type: boolean }
        showHomeCity: { type: boolean }
        emailNotifications: { type: boolean }
        pushNotifications: { type: boolean }

    SwapReviewCreateRequest:
      type: object
      required: [rating, text]
      properties:
        rating: { type: integer, minimum: 1, maximum: 5 }
        text: { type: string, minLength: 20, maxLength: 1000 }

    SwapReviewCreateResponse:
      type: object
      required: [review]
      properties:
        review:
          type: object
          required: [id, agreementId, rating, text, createdAt]
          properties:
            id: { type: string }
            agreementId: { type: string }
            rating: { type: integer }
            text: { type: string }
            createdAt: { type: string, format: date-time }

    ReportCreateRequest:
      type: object
      required: [reason]
      properties:
        reason: { type: string, minLength: 2, maxLength: 80 }
        detail: { type: string, maxLength: 2000 }
        listingId: { type: string }
        targetUserId: { type: string }

    SwapMessage:
      type: object
      required: [id, proposalId, authorId, mine, body, createdAt]
      properties:
        id: { type: string }
        proposalId: { type: string }
        authorId: { type: string }
        mine: { type: boolean, description: True when the requester authored the message. }
        body: { type: string }
        createdAt: { type: string, format: date-time }

    SwapMessagesResponse:
      type: object
      required: [messages]
      properties:
        messages:
          type: array
          items: { $ref: '#/components/schemas/SwapMessage' }
          description: Oldest first.

    SwapMessageCreateRequest:
      type: object
      required: [body]
      properties:
        body: { type: string, minLength: 1, maxLength: 4000 }

    SwapMessageCreateResponse:
      type: object
      required: [message]
      properties:
        message: { $ref: '#/components/schemas/SwapMessage' }

    BetaSignupRequest:
      type: object
      required: [email]
      properties:
        email: { type: string, format: email }
        source: { type: string }
        medium: { type: string }
        campaign: { type: string }
        term: { type: string }
        content: { type: string }
        landingPage: { type: string }
        referrer: { type: string }
        turnstileToken: { type: string }
        attestation: { type: string }

    VerificationSessionResponse:
      type: object
      required: [status]
      description: >-
        Result of starting (or resuming) an identity check. `url` is the
        hosted Didit flow to redirect the user to; null when already approved.
      properties:
        status:
          type: string
          enum: [pending, approved]
        url: { type: string, nullable: true }
        reused:
          type: boolean
          description: True when an existing pending session was resumed.

    VerificationStatusResponse:
      type: object
      required: [enabled, status, verified]
      properties:
        enabled:
          type: boolean
          description: Whether identity verification is configured server-side.
        status:
          type: string
          enum: [none, pending, approved, declined, expired]
        verified: { type: boolean }
        verifiedAt: { type: string, format: date-time, nullable: true }
        completedAt: { type: string, format: date-time, nullable: true }

    DiscoverService:
      type: object
      required: [slug, name, category, tagline, url, iconHint, priceCents, currency]
      description: >-
        One travel-service entry: either a configured affiliate partner
        (url set, no price) or an active concierge add-on (url null, real
        catalogue price). Prices are never invented for affiliate items.
      properties:
        slug: { type: string }
        name: { type: string }
        category:
          type: string
          description: 'flights | esim | experiences | insurance | concierge | ...'
        tagline: { type: string }
        url:
          type: string
          nullable: true
          description: >-
            Click-through link via /api/affiliate/{partner} (relative,
            UTM-tagged, click-logged). Null for concierge add-ons, which go
            through the concierge checkout instead.
        iconHint:
          type: string
          description: Client-side icon selector hint (plane, sim, ticket, shield, ...).
        priceCents:
          type: integer
          nullable: true
          description: Real concierge add-on price; null for affiliate partners.
        currency: { type: string, nullable: true }

    DiscoverServicesResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/DiscoverService' }

    DiscoverPhoto:
      type: object
      required: [url, width, height, alt, provider]
      description: Cached CityMedia photo (lib/city-media CityPhoto shape).
      properties:
        url: { type: string }
        width: { type: integer }
        height: { type: integer }
        alt: { type: string }
        photographer: { type: string }
        photographerUrl: { type: string }
        sourceUrl: { type: string, description: Page to credit/link back to. }
        provider:
          type: string
          enum: [pexels, unsplash, wikimedia, openverse, pixabay]

    DiscoverExperience:
      type: object
      required: [city, country, title, partner, url, photo]
      properties:
        city: { type: string }
        country: { type: string, description: Empty when the city has no active listing. }
        title: { type: string }
        partner: { type: string, enum: [getyourguide] }
        url:
          type: string
          description: >-
            Click-through link via /api/affiliate/getyourguide with the city
            query (relative, UTM-tagged, click-logged). No price — clients
            render a "Book on GetYourGuide" CTA.
        photo:
          oneOf:
            - { $ref: '#/components/schemas/DiscoverPhoto' }
            - { type: 'null' }
          description: Null → the client renders its own city illustration.

    DiscoverExperiencesResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/DiscoverExperience' }

    InsurancePolicyView:
      type: object
      description: One swap-insurance policy as rendered to a swap party (lib/insurance/access.ts policyView).
      required: [id, agreementId, provider, policyNumber, status, active, coverageAmount, premiumCents, premiumEur, platformShareCents, expiresAt, createdAt]
      properties:
        id: { type: string }
        agreementId: { type: string }
        provider: { type: string }
        policyNumber: { type: string }
        status: { type: string, description: 'pending | active | cancelled' }
        active: { type: boolean }
        coverageAmount: { type: integer, description: Coverage ceiling in EUR. }
        premiumCents: { type: integer }
        premiumEur: { type: number }
        platformShareCents: { type: integer }
        documentsUrl: { type: string, nullable: true }
        expiresAt: { type: string, format: date-time }
        createdAt: { type: string, format: date-time }
        swap:
          type: object
          required: [dateFrom, dateTo, homes]
          properties:
            dateFrom: { type: string, format: date-time }
            dateTo: { type: string, format: date-time }
            homes:
              type: array
              items: { type: string }
              description: 'The two homes as "City, Country" strings.'

    AffiliateSuggestion:
      type: object
      required: [partner, title, reason]
      properties:
        partner: { type: string, enum: [skyscanner, airalo, getyourguide, battleface] }
        title: { type: string }
        reason: { type: string }
        searchQuery: { type: string, description: Appended to the affiliate redirector as `q=`. }

paths:
  /api/auth/token:
    post:
      tags: [auth]
      summary: Issue a bearer token (native login)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/TokenRequest' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TokenResponse' }
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /api/auth/register:
    post:
      tags: [auth]
      summary: Register a new account
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RegisterRequest' }
      responses:
        '200':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RegisterResponse' }
        '409':
          description: Email already in use
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '429':
          description: Rate limited
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /api/auth/token/refresh:
    post:
      tags: [auth]
      summary: Rotate the bearer token
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RefreshResponse' }
        '401': { description: Unauthenticated }

  /api/auth/token/revoke:
    post:
      tags: [auth]
      summary: Revoke the current bearer token
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OkResponse' }

  /api/auth/resend-verification:
    post:
      tags: [auth]
      summary: Re-send the email verification link
      security: [{ bearerAuth: [] }, { cookieAuth: [] }]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OkResponse' }
        '401': { description: Unauthenticated }
        '429': { description: Rate limited }

  /api/auth/forgot-password:
    post:
      tags: [auth]
      summary: Request a password-reset email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email: { type: string, format: email }
      responses:
        '200':
          description: Always OK (anti-enumeration)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OkResponse' }

  /api/auth/reset-password:
    post:
      tags: [auth]
      summary: Complete a password reset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, password]
              properties:
                token: { type: string }
                password: { type: string, minLength: 6 }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OkResponse' }

  /api/auth/change-password:
    post:
      tags: [auth]
      summary: Change password while signed in (cookie or bearer)
      description: >-
        Verifies the current password (omit it only for social/OTP accounts
        that have no password yet — they set their first one), updates the
        hash, revokes every other mobile AuthToken (the bearer used for this
        request stays valid) and sends a security email best-effort.
        Rate limited to 5 changes per hour per user.
      security:
        - bearerAuth: []
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [newPassword]
              properties:
                currentPassword:
                  type: string
                  description: Required when the account already has a password.
                newPassword: { type: string, minLength: 6, maxLength: 128 }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OkResponse' }
        '400': { description: Invalid input (weak password) }
        '401': { description: Unauthenticated }
        '403': { description: Current password incorrect }
        '429': { description: Rate limited }

  /api/auth/providers:
    get:
      tags: [auth]
      summary: Available login providers (env-gated)
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProvidersResponse' }

  /api/auth/oauth/google:
    post:
      tags: [auth]
      summary: Sign in with a Google ID token
      description: >-
        Verifies the JWT against Google's JWKS (iss accounts.google.com, aud in
        GOOGLE_OAUTH_CLIENT_IDS, email_verified required), links or creates the
        user by verified email, and emits the standard session.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/OAuthGoogleRequest' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LoginResponse' }
        '401':
          description: Invalid token
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '429': { description: Rate limited }
        '503': { description: Provider not configured }

  /api/auth/oauth/apple:
    post:
      tags: [auth]
      summary: Sign in with Apple
      description: >-
        Verifies the identity token against Apple's JWKS. Returning users are
        resolved by Apple `sub` (the email is only present on first
        authorization). 422 APPLE_EMAIL_MISSING when a brand-new identity
        arrives without an email.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/OAuthAppleRequest' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LoginResponse' }
        '401':
          description: Invalid token
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '422':
          description: New identity without an email (re-authorize from Apple ID settings)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '429': { description: Rate limited }
        '503': { description: Provider not configured }

  /api/auth/oauth/telegram:
    post:
      tags: [auth]
      summary: Sign in with Telegram
      description: >-
        Verifies the Login Widget payload (HMAC-SHA256 keyed with
        SHA256(bot_token), max 10 minutes old). Accounts are keyed on the
        Telegram id; no email is collected.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/OAuthTelegramRequest' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LoginResponse' }
        '401':
          description: Invalid payload
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '429': { description: Rate limited }
        '503': { description: Provider not configured }

  /api/auth/otp/request:
    post:
      tags: [auth]
      summary: Send a one-time login code (email or SMS)
      description: >-
        Always 200 with an opaque body (anti-enumeration). Codes are 6 digits,
        valid 10 minutes, max 5 attempts. Rate limited 5/15min per destination
        and per IP.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/OtpRequestRequest' }
      responses:
        '200':
          description: Always OK (anti-enumeration)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OkResponse' }
        '429': { description: Rate limited }
        '503': { description: SMS not configured }

  /api/auth/otp/verify:
    post:
      tags: [auth]
      summary: Exchange a one-time code for a session
      description: >-
        Find-or-create by proven destination (email → User.email with
        emailVerifiedAt set; phone → User.phone). Emits the standard session.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/OtpVerifyRequest' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LoginResponse' }
        '401':
          description: Invalid or expired code
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '429': { description: Rate limited / code attempts exhausted }

  /api/auth/passkey/register/options:
    post:
      tags: [auth]
      summary: Start adding a passkey to the signed-in account
      description: >-
        Authenticated — a passkey always attaches to an existing account.
        Returns WebAuthn creation options (discoverable credential required,
        existing credentials excluded); the challenge is stored server-side
        for 5 minutes.
      security: [{ bearerAuth: [] }, { cookieAuth: [] }]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/WebAuthnRegistrationOptions' }
        '401': { description: Unauthenticated }

  /api/auth/passkey/register/verify:
    post:
      tags: [auth]
      summary: Finish adding a passkey
      description: >-
        Authenticated. The challenge embedded in clientDataJSON must match an
        unconsumed register challenge issued to this user; challenges are
        single-use and deleted on first redemption attempt.
      security: [{ bearerAuth: [] }, { cookieAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PasskeyRegisterVerifyRequest' }
      responses:
        '200':
          description: Credential stored
          content:
            application/json:
              schema:
                type: object
                required: [ok, passkey]
                properties:
                  ok: { type: boolean }
                  passkey: { $ref: '#/components/schemas/PasskeySummary' }
        '400': { description: Malformed payload }
        '401': { description: Unauthenticated / invalid or expired challenge / verification failed }

  /api/auth/passkey/login/options:
    post:
      tags: [auth]
      summary: Start a usernameless passkey login
      description: >-
        Anonymous + rate limited. allowCredentials is empty — the platform
        offers its discoverable credentials and the assertion's credential id
        resolves the account at verify time.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/WebAuthnAuthenticationOptions' }
        '429': { description: Rate limited }

  /api/auth/passkey/login/verify:
    post:
      tags: [auth]
      summary: Exchange a passkey assertion for a session
      description: >-
        Anonymous + rate limited. Single-use challenge, signature-counter
        regression rejected. Emits the standard session — bearer token when
        `platform` is present, web cookie otherwise.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PasskeyLoginVerifyRequest' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LoginResponse' }
        '401':
          description: Invalid challenge / unknown credential / verification failed
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '429': { description: Rate limited }

  /api/auth/passkey:
    get:
      tags: [auth]
      summary: List the caller's passkeys
      description: >-
        Authenticated. Same PasskeySummary shape as register/verify — pair
        with DELETE /api/auth/passkey/{id} to manage credentials from native
        clients.
      security: [{ bearerAuth: [] }, { cookieAuth: [] }]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [passkeys]
                properties:
                  passkeys:
                    type: array
                    items: { $ref: '#/components/schemas/PasskeySummary' }
        '401': { description: Unauthenticated }

  /api/auth/passkey/{id}:
    delete:
      tags: [auth]
      summary: Remove one of the caller's passkeys
      security: [{ bearerAuth: [] }, { cookieAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        '200':
          description: Removed
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OkResponse' }
        '401': { description: Unauthenticated }
        '404': { description: Not found (or not yours) }

  /api/me:
    get:
      tags: [me]
      summary: Current-user snapshot
      security: [{ bearerAuth: [] }, { cookieAuth: [] }]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MeResponse' }
        '401': { description: Unauthenticated }

  /api/profile:
    patch:
      tags: [profile]
      summary: Update the caller's rich profile fields
      description: >-
        Partial update of work, languages, homeCity, homeCountry. Only the keys
        present in the body are touched; nullable fields can be cleared with null.
      security: [{ bearerAuth: [] }, { cookieAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ProfileUpdateRequest' }
      responses:
        '200':
          description: Updated profile fields
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProfileUpdateResponse' }
        '400':
          description: Invalid input
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401': { description: Unauthenticated }

  /api/profile/settings:
    get:
      tags: [profile]
      summary: The caller's privacy + notification settings
      description: Defaults apply when the user never changed anything.
      security: [{ bearerAuth: [] }, { cookieAuth: [] }]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UserSettingsResponse' }
        '401': { description: Unauthenticated }
    patch:
      tags: [profile]
      summary: Update settings (partial merge)
      description: >-
        Omitted keys keep their value. searchEngineIndexing=false removes the
        user's listings from the sitemap and adds noindex on listing pages;
        showHomeCity=false hides homeCity/homeCountry on the public profile.
      security: [{ bearerAuth: [] }, { cookieAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UserSettingsUpdateRequest' }
      responses:
        '200':
          description: The settings after the merge
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UserSettingsResponse' }
        '400':
          description: Invalid input
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401': { description: Unauthenticated }

  /api/profile/interests:
    get:
      tags: [profile]
      summary: Interest catalog + current selection
      description: >-
        Mobile-friendly catalog with category groupings, mirroring the web
        /account/interests page. Works without auth (selected is then empty).
      security: [{ bearerAuth: [] }, { cookieAuth: [] }, {}]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/InterestsResponse' }
    post:
      tags: [profile]
      summary: Replace the profile's interests (and bio vibe)
      description: Unknown slugs are dropped silently; omitting bioVibe clears it.
      security: [{ bearerAuth: [] }, { cookieAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/InterestsUpdateRequest' }
      responses:
        '200':
          description: Saved
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OkResponse' }
        '400':
          description: Invalid input
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401': { description: Unauthenticated }

  /api/profiles/{id}:
    get:
      tags: [profile]
      summary: Public host profile
      description: >-
        Name, bio, verification status, interests, and the host's active
        listings. Only published (non-moderated) reviews are returned and
        counted. No auth; rate limited 60/min per IP.
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PublicProfileResponse' }
        '404':
          description: Not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '429': { description: Rate limited }

  /api/listings:
    get:
      tags: [listings]
      summary: Search listings
      parameters:
        - { name: city, in: query, schema: { type: string }, description: CSV of cities }
        - { name: type, in: query, schema: { type: string }, description: CSV of property types }
        - { name: minSqm, in: query, schema: { type: integer } }
        - { name: minSleeps, in: query, schema: { type: integer } }
        - { name: pets, in: query, schema: { type: integer, enum: [1] } }
        - { name: wfh, in: query, schema: { type: integer, enum: [1] } }
        - { name: stepFree, in: query, schema: { type: integer, enum: [1] } }
        - { name: from, in: query, schema: { type: string } }
        - { name: to, in: query, schema: { type: string } }
        - { name: sort, in: query, schema: { type: string, enum: [match, newest, size_desc] } }
        - { name: page, in: query, schema: { type: integer } }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ListingSearchResponse' }
    post:
      tags: [listings]
      summary: Create (publish) a listing
      description: Requires a verified email; plan-gated.
      security: [{ bearerAuth: [] }, { cookieAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ListingCreateDraft' }
      responses:
        '200':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ListingCreateResponse' }
        '401': { description: Unauthenticated }
        '403':
          description: EMAIL_NOT_VERIFIED
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '402':
          description: Plan limit reached
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /api/listings/{id}:
    get:
      tags: [listings]
      summary: Listing detail
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      security: [{ bearerAuth: [] }, { cookieAuth: [] }, {}]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ListingDetailResponse' }
        '404': { description: Not found }
    put:
      tags: [listings]
      summary: Update a listing (owner only)
      description: Accepts the full create field set; city art and geocode are regenerated only when the city changes.
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      security: [{ bearerAuth: [] }, { cookieAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ListingCreateDraft' }
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ListingCreateResponse' }
        '401': { description: Unauthenticated }
        '403': { description: Not the owner }
        '404': { description: Not found }

  /api/listings/{id}/home-guide:
    get:
      tags: [listings]
      summary: Read a listing's home guide ("Guida di casa")
      description: >-
        The owner always reads (and may write) their own guide. A non-owner
        reads it only when an ACTIVE swap agreement ties their listing to this
        one AND the reveal gate is open (48h before the stay, or once both
        guides are complete). Before the gate the body is { locked: true,
        unlocksAt } with NO guide content — reveal gating is strictly
        server-side.
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      security: [{ bearerAuth: [] }, { cookieAuth: [] }]
      responses:
        '200':
          description: OK (guide present, or locked flag for a gated counterparty)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/HomeGuideResponse' }
        '401': { description: Unauthenticated }
        '403': { description: Not the owner and no active swap ties the caller to this listing }
        '404': { description: Listing not found }
    put:
      tags: [listings]
      summary: Upsert your listing's home guide (owner only, partial)
      description: Partial upsert — only the provided fields are written; an explicit null clears a field.
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      security: [{ bearerAuth: [] }, { cookieAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/HomeGuideUpdate' }
      responses:
        '200':
          description: Saved
          content:
            application/json:
              schema:
                type: object
                required: [ok, guide]
                properties:
                  ok: { type: boolean }
                  guide: { $ref: '#/components/schemas/HomeGuide' }
        '400': { description: Invalid input }
        '401': { description: Unauthenticated }
        '403': { description: Not the owner }
        '404': { description: Listing not found }

  /api/cities:
    get:
      tags: [listings]
      summary: City autocomplete
      description: Distinct cities of active listings with their listing counts. No auth.
      parameters:
        - { name: q, in: query, schema: { type: string }, description: 'Case-insensitive city-name prefix; omit for all cities.' }
      responses:
        '200':
          description: OK (ordered by listing count desc, max 20)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CityAutocompleteResponse' }

  /api/favorites:
    get:
      tags: [favorites]
      summary: The user's favorited listings (wishlist)
      description: Active listings only, newest favorite first.
      security: [{ bearerAuth: [] }, { cookieAuth: [] }]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FavoritesResponse' }
        '401': { description: Unauthenticated }

  /api/favorites/ids:
    get:
      tags: [favorites]
      summary: Favorited listing ids
      description: Cheap endpoint for syncing heart states on browse cards.
      security: [{ bearerAuth: [] }, { cookieAuth: [] }]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FavoriteIdsResponse' }
        '401': { description: Unauthenticated }

  /api/favorites/{listingId}:
    put:
      tags: [favorites]
      summary: Favorite a listing
      description: Idempotent — favoriting an already-favorited listing is a no-op success.
      parameters:
        - { name: listingId, in: path, required: true, schema: { type: string } }
      security: [{ bearerAuth: [] }, { cookieAuth: [] }]
      responses:
        '200':
          description: Favorited
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FavoriteToggleResponse' }
        '401': { description: Unauthenticated }
        '404': { description: Listing missing or inactive }
    delete:
      tags: [favorites]
      summary: Unfavorite a listing
      description: Idempotent — unfavoriting something that isn't favorited is a no-op success.
      parameters:
        - { name: listingId, in: path, required: true, schema: { type: string } }
      security: [{ bearerAuth: [] }, { cookieAuth: [] }]
      responses:
        '200':
          description: Unfavorited
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FavoriteToggleResponse' }
        '401': { description: Unauthenticated }

  /api/saved-searches:
    get:
      tags: [saved-searches]
      summary: The user's saved searches
      description: Plus-plan feature; newest first.
      security: [{ bearerAuth: [] }, { cookieAuth: [] }]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SavedSearchesResponse' }
        '401': { description: Unauthenticated }
        '402':
          description: Plan does not include saved searches
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PlanLimitError' }
    post:
      tags: [saved-searches]
      summary: Save a search
      description: Plus-plan feature; capped at 20 per user.
      security: [{ bearerAuth: [] }, { cookieAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SavedSearchCreateRequest' }
      responses:
        '200':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SavedSearchCreateResponse' }
        '400':
          description: Invalid input
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401': { description: Unauthenticated }
        '402':
          description: Plan does not include saved searches
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PlanLimitError' }
        '409':
          description: Saved-search cap reached (20)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /api/saved-searches/{id}:
    delete:
      tags: [saved-searches]
      summary: Delete a saved search (owner only)
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      security: [{ bearerAuth: [] }, { cookieAuth: [] }]
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OkResponse' }
        '401': { description: Unauthenticated }
        '404': { description: Not found (or not yours) }

  /api/ai/proposal-message:
    post:
      tags: [ai]
      summary: Draft a swap-proposal cover message
      description: Server-side AI draft built from both listings and the proposer's profile; falls back to a template when no AI key is configured. Rate-limited 20/10min per user.
      security: [{ bearerAuth: [] }, { cookieAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [proposerListingId, targetListingId]
              properties:
                proposerListingId: { type: string }
                targetListingId: { type: string }
                dateFrom: { type: string, description: 'yyyy-MM-dd' }
                dateTo: { type: string, description: 'yyyy-MM-dd' }
                hostNotes: { type: string, maxLength: 2000 }
      responses:
        '200':
          description: Drafted
          content:
            application/json:
              schema:
                type: object
                required: [message]
                properties:
                  message: { type: string }
                  source: { type: string, description: 'ai | fallback' }
        '401': { description: Unauthenticated }
        '429': { description: Rate limited }

  /api/assistant/profile:
    get:
      tags: [assistant]
      summary: The caller's AI travel profile
      description: >-
        Synthesised ONLY from in-app signals (interests, bio, favorites, saved
        searches, the user's own swap messages). Built on first read when
        absent. Deterministic aggregation when no AI provider is configured.
      security: [{ bearerAuth: [] }, { cookieAuth: [] }]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TravelProfile' }
        '401': { description: Unauthenticated }
    delete:
      tags: [assistant]
      summary: Delete the AI travel profile (transparency)
      security: [{ bearerAuth: [] }, { cookieAuth: [] }]
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OkResponse' }
        '401': { description: Unauthenticated }

  /api/assistant/profile/refresh:
    post:
      tags: [assistant]
      summary: Rebuild the AI travel profile from the latest in-app signals
      description: Rate-limited 5/hour per user.
      security: [{ bearerAuth: [] }, { cookieAuth: [] }]
      responses:
        '200':
          description: Rebuilt
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TravelProfile' }
        '401': { description: Unauthenticated }
        '429': { description: Rate limited }

  /api/assistant/inspire:
    post:
      tags: [assistant]
      summary: Compose a "Get Inspired" swap package
      description: >-
        Picks the best real, active, date-compatible swap candidates for the
        caller (match engine + wishlist/profile boosts), drafts a proposal
        message, and enriches the package with env-gated affiliate experiences
        and services (no invented prices or availability). Saves a draft
        InspirationPackage. Rate-limited 10/hour per user.
      security: [{ bearerAuth: [] }, { cookieAuth: [] }]
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                prompt: { type: string, maxLength: 500, description: 'Optional free-text wish (may be a voice transcription) — parsed into structured filters; explicit fields win' }
                dateFrom: { type: string, description: 'yyyy-MM-dd' }
                dateTo: { type: string, description: 'yyyy-MM-dd' }
                city: { type: string, maxLength: 100, description: 'Explicit destination city — wins over anything extracted from the prompt' }
      responses:
        '200':
          description: Package composed
          content:
            application/json:
              schema: { $ref: '#/components/schemas/InspirePackage' }
        '401': { description: Unauthenticated }
        '422': { description: 'NO_ACTIVE_LISTING or NO_CANDIDATES' }
        '429': { description: Rate limited }

  /api/assistant/inspire/{id}:
    get:
      tags: [assistant]
      summary: Fetch one package with its current payment status (owner only)
      description: >-
        Returns the package payload plus status/paymentStatus. Clients poll
        this after returning from the payment sheet (Safari View Controller /
        Custom Tab): paymentStatus flips to "saved" via the
        setup_intent.succeeded webhook, so the app can show "card saved"
        before calling /confirm. Works for any status (draft/confirmed/dismissed).
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      security: [{ bearerAuth: [] }, { cookieAuth: [] }]
      responses:
        '200':
          description: Package state
          content:
            application/json:
              schema:
                type: object
                required: [id, status, paymentStatus, payable, package]
                properties:
                  id: { type: string }
                  status: { type: string, description: 'draft | confirmed | dismissed' }
                  paymentStatus: { type: string, description: 'none | saved | charged | failed | canceled' }
                  proposalId: { type: string, nullable: true, description: 'Set once confirmed' }
                  payable:
                    type: object
                    required: [totalCents, currency]
                    properties:
                      totalCents: { type: integer }
                      currency: { type: string }
                  package: { $ref: '#/components/schemas/InspirePackage' }
        '401': { description: Unauthenticated }
        '404': { description: Package not found (or not yours) }
        '422': { description: Stored payload is corrupt }

  /api/assistant/inspire/{id}/confirm:
    post:
      tags: [assistant]
      summary: Confirm a package — creates a REAL swap proposal
      description: >-
        Goes through the same code path as POST /api/proposals, so suspension,
        plan limits (402 upsell) and notifications all apply. Body may edit the
        pick (must be a listing from the package), the dates and the message.
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      security: [{ bearerAuth: [] }, { cookieAuth: [] }]
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                listingId: { type: string, description: 'Destination or one of the alternatives' }
                dateFrom: { type: string, description: 'yyyy-MM-dd' }
                dateTo: { type: string, description: 'yyyy-MM-dd' }
                message: { type: string, maxLength: 2000 }
      responses:
        '200':
          description: Proposal created, package confirmed
          content:
            application/json:
              schema:
                type: object
                required: [ok, proposalId, packageId]
                properties:
                  ok: { type: boolean }
                  proposalId: { type: string }
                  packageId: { type: string }
                  paymentStatus: { type: string, description: 'none | saved — "saved" means the card will be charged off-session only if the host accepts' }
        '401': { description: Unauthenticated }
        '402': { description: Plan limit reached (same upsell as POST /api/proposals) }
        '403': { description: Account suspended }
        '404': { description: Package not found (or not yours) }
        '422': { description: Package already confirmed/dismissed }

  /api/assistant/inspire/{id}/items:
    patch:
      tags: [assistant]
      summary: Toggle package items on/off (editable draft)
      description: >-
        Accepts a single { itemId, selected } or { items: [...] }. Only DRAFT
        packages are editable; confirm/checkout/charge read the selections
        current at their time. Unknown item ids are rejected.
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      security: [{ bearerAuth: [] }, { cookieAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - type: object
                  required: [itemId, selected]
                  properties:
                    itemId: { type: string }
                    selected: { type: boolean }
                - type: object
                  required: [items]
                  properties:
                    items:
                      type: array
                      minItems: 1
                      maxItems: 50
                      items:
                        type: object
                        required: [itemId, selected]
                        properties:
                          itemId: { type: string }
                          selected: { type: boolean }
      responses:
        '200':
          description: Selections updated
          content:
            application/json:
              schema:
                type: object
                required: [ok, items, payable]
                properties:
                  ok: { type: boolean }
                  items:
                    type: object
                    properties:
                      experiences:
                        type: array
                        items: { $ref: '#/components/schemas/InspireItemFlags' }
                      services:
                        type: array
                        items: { $ref: '#/components/schemas/InspireItemFlags' }
                      addOns:
                        type: array
                        items: { $ref: '#/components/schemas/InspireItemFlags' }
                  payable:
                    type: object
                    required: [totalCents, currency]
                    properties:
                      totalCents: { type: integer }
                      currency: { type: string }
        '400': { description: Unknown itemId or invalid input }
        '401': { description: Unauthenticated }
        '404': { description: Package not found (or not yours) }
        '422': { description: Package already confirmed/dismissed }

  /api/assistant/inspire/{id}/checkout:
    post:
      tags: [assistant]
      summary: Save a card for pay-on-accept (no charge)
      description: >-
        Pay-on-accept, env-gated on Stripe. Payable items are ONLY the selected
        concierge add-ons with priceCents > 0 — affiliate items stay external
        links. When payable items exist and Stripe is configured, returns a
        SetupIntent clientSecret (usage off_session) so the card is saved;
        NOTHING is charged until the host accepts the proposal. Without Stripe
        or with zero payable items, returns paymentRequired=false and the flow
        continues without a payment step.
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      security: [{ bearerAuth: [] }, { cookieAuth: [] }]
      responses:
        '200':
          description: Checkout state
          content:
            application/json:
              schema:
                type: object
                required: [paymentRequired, summary]
                properties:
                  paymentRequired: { type: boolean }
                  clientSecret: { type: string, description: 'SetupIntent client secret — present only when paymentRequired' }
                  note: { type: string, description: "Copy for the client: you'll only be charged if the host accepts" }
                  summary:
                    type: object
                    required: [payableItems, totalCents, currency]
                    properties:
                      payableItems:
                        type: array
                        items:
                          type: object
                          required: [id, slug, name, priceCents]
                          properties:
                            id: { type: string }
                            slug: { type: string }
                            name: { type: string }
                            priceCents: { type: integer }
                      totalCents: { type: integer }
                      currency: { type: string }
        '401': { description: Unauthenticated }
        '404': { description: Package not found (or not yours) }
        '422': { description: Package already confirmed/dismissed }

  /api/assistant/inspire/{id}/dismiss:
    post:
      tags: [assistant]
      summary: Dismiss a draft package
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      security: [{ bearerAuth: [] }, { cookieAuth: [] }]
      responses:
        '200':
          description: Dismissed
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OkResponse' }
        '401': { description: Unauthenticated }
        '404': { description: Package not found (or not yours) }
        '422': { description: Package already confirmed/dismissed }

  /api/proposals:
    get:
      tags: [proposals]
      summary: Proposal inbox (bucketed)
      security: [{ bearerAuth: [] }, { cookieAuth: [] }]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/InboxResponse' }
        '401': { description: Unauthenticated }
    post:
      tags: [proposals]
      summary: Create a proposal
      security: [{ bearerAuth: [] }, { cookieAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ProposalDraft' }
      responses:
        '200':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProposalCreateResponse' }

  /api/proposals/{id}:
    get:
      tags: [proposals]
      summary: Proposal thread + agreement
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      security: [{ bearerAuth: [] }, { cookieAuth: [] }]
      responses:
        '200': { description: OK }
        '401': { description: Unauthenticated }
    post:
      tags: [proposals]
      summary: Act on a proposal (accept/decline/counter/withdraw)
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      security: [{ bearerAuth: [] }, { cookieAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ProposalAction' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OkResponse' }

  /api/proposals/{id}/messages:
    get:
      tags: [proposals]
      summary: Swap thread messages
      description: Only the two parties of the proposal may read the thread.
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      security: [{ bearerAuth: [] }, { cookieAuth: [] }]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SwapMessagesResponse' }
        '401': { description: Unauthenticated }
        '403': { description: Not a party of this proposal }
        '404': { description: Proposal not found }
    post:
      tags: [proposals]
      summary: Post a message in the swap thread
      description: >-
        Only the two parties may post. Notifies the other side via email +
        push. Rate-limited 30/min per user.
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      security: [{ bearerAuth: [] }, { cookieAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SwapMessageCreateRequest' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SwapMessageCreateResponse' }
        '400':
          description: Invalid input
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401': { description: Unauthenticated }
        '403': { description: Not a party of this proposal }
        '404': { description: Proposal not found }
        '429': { description: Rate limited }

  /api/agreements/{id}/review:
    post:
      tags: [proposals]
      summary: Review the other party of a completed swap
      description: >-
        Only the two parties of the agreement, only once the agreement is
        COMPLETED, and at most one review per author per agreement. The subject
        is always the other party. Rate-limited 10/hour per user.
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      security: [{ bearerAuth: [] }, { cookieAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SwapReviewCreateRequest' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SwapReviewCreateResponse' }
        '400':
          description: Invalid input
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401': { description: Unauthenticated }
        '403': { description: Not a party of this agreement }
        '404': { description: Agreement not found }
        '409': { description: Already reviewed }
        '422': { description: Agreement not COMPLETED yet }
        '429': { description: Rate limited }

  /api/reports:
    post:
      tags: [reports]
      summary: Report a listing or user
      security: [{ bearerAuth: [] }, { cookieAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ReportCreateRequest' }
      responses:
        '200':
          description: Filed
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OkResponse' }
        '400':
          description: Invalid input
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '401': { description: Unauthenticated }

  /api/devices:
    post:
      tags: [devices]
      summary: Register a push token
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/DeviceRegister' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DeviceRegisterResponse' }
    delete:
      tags: [devices]
      summary: Unregister the current device's push token
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OkResponse' }

  /api/verification/session:
    post:
      tags: [verification]
      summary: Start (or resume) an identity verification flow
      description: >-
        Creates a hosted Didit KYC session (reusing a still-pending one) and
        returns the URL to redirect the user to. Env-gated — 503 until Didit
        is configured server-side. Rate limited to 3 per hour per user.
      security: [{ bearerAuth: [] }, { cookieAuth: [] }]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/VerificationSessionResponse' }
        '401': { description: Unauthenticated }
        '429': { description: Rate limited }
        '503': { description: Verification not configured }

  /api/verification/status:
    get:
      tags: [verification]
      summary: Current identity verification state
      description: >-
        Latest identity-check status for the signed-in user. When no webhook
        secret is configured and the attempt is pending, the server polls
        Didit directly before answering.
      security: [{ bearerAuth: [] }, { cookieAuth: [] }]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/VerificationStatusResponse' }
        '401': { description: Unauthenticated }

  /api/beta:
    post:
      tags: [waitlist]
      summary: Join the waitlist (subscriber capture)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/BetaSignupRequest' }
      responses:
        '200':
          description: OK (idempotent on email)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OkResponse' }
        '429': { description: Rate limited }

  /api/discover/services:
    get:
      tags: [discover]
      summary: Travel-services catalogue
      description: >-
        Configured affiliate partners (env-gated — a partner without its
        AFF_* id is excluded) plus active concierge add-ons with their real
        prices. Public; mildly rate limited per IP.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DiscoverServicesResponse' }
        '429': { description: Rate limited }

  /api/discover/experiences:
    get:
      tags: [discover]
      summary: Experience cards by city (GetYourGuide affiliate)
      description: >-
        Themed experience cards for one city, or — when `city` is omitted —
        one card per top city by active listings. Empty list when the
        GetYourGuide affiliate id is not configured. Photos come from the
        CityMedia cache; never any prices. Public; mildly rate limited per IP.
      parameters:
        - { name: city, in: query, schema: { type: string }, description: 'City name (case-insensitive); omit for the top-cities feed.' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DiscoverExperiencesResponse' }
        '429': { description: Rate limited }

  /api/auth/login:
    post:
      tags: [auth]
      summary: Web cookie login
      description: >-
        Email + password login for the web client — sets the signed
        `swapl_session` cookie. Native clients use POST /api/auth/token
        instead. Rate limited 30/5min per IP.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string, minLength: 6, maxLength: 128 }
      responses:
        '200':
          description: Session cookie set
          content:
            application/json:
              schema:
                type: object
                required: [ok, userId, emailVerified]
                properties:
                  ok: { type: boolean }
                  userId: { type: string }
                  emailVerified: { type: boolean }
        '400': { description: Invalid input }
        '401': { description: Invalid email or password }
        '403': { description: Account suspended }
        '429': { description: Rate limited }

  /api/auth/logout:
    post:
      tags: [auth]
      summary: Web cookie logout
      description: >-
        Clears the `swapl_session` cookie and redirects to the public home.
        Posted by plain HTML forms, so the response is a 303 redirect rather
        than JSON.
      security: [{ cookieAuth: [] }]
      responses:
        '303': { description: Cookie cleared; redirect to `/`. }

  /api/ai/suggestions:
    get:
      tags: [ai]
      summary: Personalised swap suggestions
      description: >-
        Up to 3 listings picked by the AI from a candidate pool, each with a
        match score and a one-line reason; deterministic fallback when no AI
        is configured. Rate limited 20/min per user.
      security: [{ bearerAuth: [] }, { cookieAuth: [] }]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      type: object
                      required: [listing, matchScore, reason, source]
                      properties:
                        listing: { $ref: '#/components/schemas/Listing' }
                        matchScore: { type: number }
                        reason: { type: string }
                        source: { type: string, description: 'ai | fallback' }
        '401': { description: Unauthenticated }
        '429': { description: Rate limited }

  /api/ai/listing-content:
    post:
      tags: [ai]
      summary: Draft listing title + description
      description: >-
        AI-written listing copy from structured facts; template fallback when
        no AI is configured. Rate limited 20/10min per user.
      security: [{ bearerAuth: [] }, { cookieAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [city, neighbourhood, propertyType, sizeSqm, sleeps, bedrooms, bathrooms]
              properties:
                city: { type: string }
                neighbourhood: { type: string }
                country: { type: string }
                propertyType: { type: string }
                sizeSqm: { type: integer, minimum: 20, maximum: 800 }
                sleeps: { type: integer, minimum: 1, maximum: 20 }
                bedrooms: { type: integer, minimum: 0, maximum: 15 }
                bathrooms: { type: integer, minimum: 0, maximum: 10 }
                floor: { type: integer, nullable: true }
                hasElevator: { type: boolean }
                stepFreeAccess: { type: boolean }
                petsAllowed: { type: boolean }
                petTypes: { type: array, items: { type: string } }
                wfhSetup: { type: boolean }
                wfhDesks: { type: integer, minimum: 0, maximum: 10 }
                amenities: { type: array, items: { type: string }, maxItems: 20 }
                availableFrom: { type: string }
                availableTo: { type: string }
                hostNotes: { type: string, maxLength: 2000 }
      responses:
        '200':
          description: Drafted
          content:
            application/json:
              schema:
                type: object
                required: [title, description, source]
                properties:
                  title: { type: string }
                  description: { type: string }
                  source: { type: string, description: 'ai | fallback' }
        '400': { description: Invalid input }
        '401': { description: Unauthenticated }
        '429': { description: Rate limited }

  /api/ai/city-illustration:
    post:
      tags: [ai]
      summary: City postcard palette + motif
      description: >-
        AI-decided (and cached) palette, motif set and postcard for a known
        catalog city; 422 for cities outside the catalog. Rate limited
        30/min per user.
      security: [{ bearerAuth: [] }, { cookieAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [city]
              properties:
                city: { type: string, maxLength: 80 }
                country: { type: string, maxLength: 80 }
      responses:
        '200':
          description: Art decision (from cache, preset, AI or fallback)
          content:
            application/json:
              schema:
                type: object
                required: [city, palette, motif, postcard, source]
                properties:
                  city: { type: string }
                  country: { type: string, nullable: true }
                  palette: { type: object, additionalProperties: true }
                  motif: { type: array, items: { type: string } }
                  postcard: { type: object, additionalProperties: true }
                  source: { type: string, description: 'ai | fallback | preset | cache' }
        '400': { description: Invalid input }
        '401': { description: Unauthenticated }
        '422': { description: City not in the illustration catalog }
        '429': { description: Rate limited }

  /api/ai/affiliate-suggestions:
    post:
      tags: [ai]
      summary: Activity suggestions for a confirmed swap
      description: >-
        Up to 4 partner-bookable activity cards for the destination city of
        one of the caller's swap agreements, matched to their interests.
        Rate limited 10/10min per user.
      security: [{ bearerAuth: [] }, { cookieAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [agreementId]
              properties:
                agreementId: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [items, source]
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/AffiliateSuggestion' }
                  source: { type: string, description: 'ai | fallback' }
        '400': { description: Invalid input }
        '401': { description: Unauthenticated }
        '403': { description: Not a party of the agreement }
        '404': { description: Agreement not found }
        '429': { description: Rate limited }

  /api/ai/settings:
    get:
      tags: [ai]
      summary: Read my AI provider override
      description: Provider/model override and whether a personal API key is stored (the key itself is never echoed).
      security: [{ bearerAuth: [] }, { cookieAuth: [] }]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [provider, model, hasKey]
                properties:
                  provider: { type: string, description: Empty string when unset. }
                  model: { type: string }
                  hasKey: { type: boolean }
        '401': { description: Unauthenticated }
    post:
      tags: [ai]
      summary: Update my AI provider override
      description: Partial update; empty-string provider/model clears the field, an omitted apiKey keeps the stored one.
      security: [{ bearerAuth: [] }, { cookieAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                provider: { type: string, description: One of the supported providers, or empty string to clear. }
                model: { type: string, maxLength: 120 }
                apiKey: { type: string, maxLength: 400 }
      responses:
        '200':
          description: Saved
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OkResponse' }
        '400': { description: Invalid input }
        '401': { description: Unauthenticated }
    delete:
      tags: [ai]
      summary: Clear my AI provider override
      security: [{ bearerAuth: [] }, { cookieAuth: [] }]
      responses:
        '200':
          description: Cleared
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OkResponse' }
        '401': { description: Unauthenticated }

  /api/agreements/{id}/cancel:
    post:
      tags: [agreements]
      summary: Cancel a swap before it starts
      description: >-
        Marks an ACTIVE agreement INTERRUPTED, cancels the insurance policy
        at the underwriter and notifies both parties. Only before dateFrom —
        mid-stay interruptions go through the claim flow instead.
      security: [{ bearerAuth: [] }, { cookieAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        '200':
          description: Cancelled
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OkResponse' }
        '401': { description: Unauthenticated }
        '403': { description: Not a party of the agreement }
        '404': { description: Not found }
        '409': { description: Already closed, or the cancellation window has passed }

  /api/agreements/{id}/trip:
    get:
      tags: [agreements]
      summary: Trip cockpit payload for one party
      description: >-
        The derived trip phase, a countdown, the caller's own key code +
        insurance, and — gated strictly server-side — the other home's exact
        address and home guide. Before the reveal gate (48h before the stay, or
        once both guides are complete) the other address is null and otherGuide
        is { locked, unlocksAt }; completeness percentages are always exposed
        (no content leak).
      security: [{ bearerAuth: [] }, { cookieAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TripCockpitResponse' }
        '401': { description: Unauthenticated }
        '403': { description: Not a party of the agreement }
        '404': { description: Not found }

  /api/agreements/{id}/check-in:
    post:
      tags: [agreements]
      summary: Record arrival (check-in)
      description: >-
        A party records arrival. Idempotent per party — a second check-in
        returns the existing event. The check-in moves the derived phase to
        IN_PROGRESS and notifies the other party (email + push, best effort).
        Photos must already be uploaded via /api/uploads/listing-photo.
        Rate-limited 10 / 5 min per user.
      security: [{ bearerAuth: [] }, { cookieAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CheckEventRequest' }
      responses:
        '200':
          description: Event recorded (or the existing one, when duplicate)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CheckEventResponse' }
        '400': { description: Invalid input }
        '401': { description: Unauthenticated }
        '403': { description: Not a party of the agreement }
        '404': { description: Not found }
        '409': { description: Swap is no longer active }
        '429': { description: Rate limited }

  /api/agreements/{id}/check-out:
    post:
      tags: [agreements]
      summary: Record departure (check-out)
      description: >-
        A party records departure. Idempotent per party; notifies the other
        party (email + push, best effort). Photos must already be uploaded via
        /api/uploads/listing-photo. Rate-limited 10 / 5 min per user.
      security: [{ bearerAuth: [] }, { cookieAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CheckEventRequest' }
      responses:
        '200':
          description: Event recorded (or the existing one, when duplicate)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CheckEventResponse' }
        '400': { description: Invalid input }
        '401': { description: Unauthenticated }
        '403': { description: Not a party of the agreement }
        '404': { description: Not found }
        '409': { description: Swap is no longer active }
        '429': { description: Rate limited }

  /api/agreements/{id}/dispute:
    post:
      tags: [agreements]
      summary: Open a dispute (resolution center)
      description: >-
        A party of the agreement opens a dispute. category safety|access is
        flagged urgent so clients foreground the 24/7 line. Notifies the other
        party + the admin inbox (email + push, best effort). Photos must already
        be uploaded via /api/uploads/listing-photo. Rate-limited 5 / 10 min per
        user.
      security: [{ bearerAuth: [] }, { cookieAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/DisputeCreateRequest' }
      responses:
        '200':
          description: Dispute opened
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DisputeCreateResponse' }
        '400': { description: Invalid input }
        '401': { description: Unauthenticated }
        '403': { description: Not a party of the agreement }
        '404': { description: Not found }
        '429': { description: Rate limited }
    get:
      tags: [agreements]
      summary: Dispute status + timeline for the parties
      description: >-
        Returns the disputes on this agreement (newest first), each with its
        full message timeline. Only the two parties of the agreement may read it.
      security: [{ bearerAuth: [] }, { cookieAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        '200':
          description: Disputes + timeline
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DisputeListResponse' }
        '401': { description: Unauthenticated }
        '403': { description: Not a party of the agreement }
        '404': { description: Not found }

  /api/disputes/{id}/message:
    post:
      tags: [agreements]
      summary: Reply on a dispute
      description: >-
        Add a message to an open dispute. Either party of the underlying
        agreement OR a swapl_admin may post. A party reply nudges status to
        investigating; an admin reply nudges it to awaiting_response.
        resolved|closed disputes reject new messages (409). Notifies the other
        participants (email + push, best effort). Photos must already be
        uploaded via /api/uploads/listing-photo. Rate-limited 30 / 5 min per
        user.
      security: [{ bearerAuth: [] }, { cookieAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/DisputeMessageRequest' }
      responses:
        '200':
          description: Message added
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DisputeMessageResponse' }
        '400': { description: Invalid input }
        '401': { description: Unauthenticated }
        '403': { description: Not a party of the dispute }
        '404': { description: Not found }
        '409': { description: Dispute is closed }
        '429': { description: Rate limited }

  /api/billing/checkout/subscription:
    post:
      tags: [billing]
      summary: Start a subscription checkout
      description: Stripe Checkout session for a plus/pro plan (14-day trial). Returns the hosted checkout URL.
      security: [{ bearerAuth: [] }, { cookieAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [plan, cycle]
              properties:
                plan: { type: string, enum: [plus, pro] }
                cycle: { type: string, enum: [monthly, yearly] }
      responses:
        '200':
          description: Checkout created
          content:
            application/json:
              schema:
                type: object
                required: [url]
                properties:
                  url: { type: string }
        '400': { description: Invalid input }
        '401': { description: Unauthenticated }
        '503': { description: Billing not configured for this plan/cycle }

  /api/billing/portal:
    post:
      tags: [billing]
      summary: Open the Stripe billing portal
      security: [{ bearerAuth: [] }, { cookieAuth: [] }]
      responses:
        '200':
          description: Portal session created
          content:
            application/json:
              schema:
                type: object
                required: [url]
                properties:
                  url: { type: string }
        '401': { description: Unauthenticated }
        '503': { description: Billing not configured }

  /api/billing/cancel:
    post:
      tags: [billing]
      summary: Cancel my subscription at period end
      security: [{ bearerAuth: [] }, { cookieAuth: [] }]
      responses:
        '200':
          description: Set to cancel at period end
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OkResponse' }
        '401': { description: Unauthenticated }
        '404': { description: No active subscription }
        '503': { description: Billing not configured }

  /api/insurance:
    get:
      tags: [insurance]
      summary: My insurance policies
      description: >-
        With `agreementId`, the single policy of that swap (`{ policy }`);
        without it, every policy across the caller's swaps (`{ policies }`).
        Visibility is limited to the two swap parties.
      security: [{ bearerAuth: [] }, { cookieAuth: [] }]
      parameters:
        - { name: agreementId, in: query, schema: { type: string } }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    required: [policy]
                    properties:
                      policy: { $ref: '#/components/schemas/InsurancePolicyView' }
                  - type: object
                    required: [policies]
                    properties:
                      policies:
                        type: array
                        items: { $ref: '#/components/schemas/InsurancePolicyView' }
        '401': { description: Unauthenticated }
        '404': { description: No policy for that agreement }

  /api/insurance/quote:
    get:
      tags: [insurance]
      summary: Non-binding premium preview for a proposal
      security: [{ bearerAuth: [] }, { cookieAuth: [] }]
      parameters:
        - { name: proposalId, in: query, required: true, schema: { type: string } }
      responses:
        '200':
          description: Quote
          content:
            application/json:
              schema:
                type: object
                required: [provider, nights, coverageAmount, premiumCents, premiumEur, platformShareCents]
                properties:
                  provider: { type: string }
                  nights: { type: integer }
                  coverageAmount: { type: integer }
                  premiumCents: { type: integer }
                  premiumEur: { type: number }
                  platformShareCents: { type: integer }
        '400': { description: proposalId is required }
        '401': { description: Unauthenticated }
        '403': { description: Not a party of the proposal }
        '404': { description: Proposal not found }

  /api/insurance/retry:
    post:
      tags: [insurance]
      summary: Re-issue a pending policy
      description: Heals a policy stuck in "pending" because the underwriter call failed at swap acceptance. Either party may trigger it.
      security: [{ bearerAuth: [] }, { cookieAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [agreementId]
              properties:
                agreementId: { type: string }
      responses:
        '200':
          description: Policy issued
          content:
            application/json:
              schema:
                type: object
                required: [ok, policy]
                properties:
                  ok: { type: boolean }
                  policy: { $ref: '#/components/schemas/InsurancePolicyView' }
        '400': { description: agreementId is required }
        '401': { description: Unauthenticated }
        '403': { description: Not a party of the agreement }
        '404': { description: Agreement or policy not found }
        '409': { description: Policy is not pending }
        '502': { description: Underwriter unavailable }

  /api/insurance/documents/{policyNumber}:
    get:
      tags: [insurance]
      summary: Certificate of Cover
      description: Plain-text certificate for one policy. Only the two swap parties can read it.
      security: [{ bearerAuth: [] }, { cookieAuth: [] }]
      parameters:
        - { name: policyNumber, in: path, required: true, schema: { type: string } }
      responses:
        '200':
          description: Certificate
          content:
            text/plain:
              schema: { type: string }
        '401': { description: Unauthenticated }
        '403': { description: Not a party of the policy's swap }
        '404': { description: Not found }

  /api/concierge/checkout:
    post:
      tags: [concierge]
      summary: Buy a concierge add-on for a swap
      description: >-
        Stripe Checkout when configured (`{ url, mode: "checkout" }`),
        otherwise records the order immediately
        (`{ ok, mode: "pre_launch", orderId }`). Affiliate add-ons are
        rejected — they go through the affiliate redirector.
      security: [{ bearerAuth: [] }, { cookieAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [agreementId, slug]
              properties:
                agreementId: { type: string }
                slug: { type: string }
      responses:
        '200':
          description: Checkout URL or recorded pre-launch order
          content:
            application/json:
              schema:
                type: object
                required: [mode]
                properties:
                  mode: { type: string, enum: [checkout, pre_launch] }
                  url: { type: string }
                  ok: { type: boolean }
                  orderId: { type: string }
        '400': { description: Invalid input, or affiliate add-on }
        '401': { description: Unauthenticated }
        '403': { description: Not a party of the agreement }
        '404': { description: Agreement or add-on not found }

  /api/corporate/checkout:
    post:
      tags: [corporate]
      summary: Self-serve corporate seats checkout
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [companyName, email, seatCount]
              properties:
                companyName: { type: string, minLength: 2 }
                email: { type: string, format: email }
                seatCount: { type: integer, minimum: 5, maximum: 2000 }
      responses:
        '200':
          description: Checkout created
          content:
            application/json:
              schema:
                type: object
                required: [url]
                properties:
                  url: { type: string }
        '400': { description: Invalid input }
        '503': { description: Corporate checkout not configured — use the lead form }

  /api/corporate/leads:
    post:
      tags: [corporate]
      summary: Submit a corporate lead
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [companyName, contactName, email]
              properties:
                companyName: { type: string, minLength: 2 }
                contactName: { type: string, minLength: 2 }
                email: { type: string, format: email }
                phone: { type: string }
                employeeCount: { type: integer, minimum: 1 }
                useCase: { type: string, maxLength: 2000 }
      responses:
        '200':
          description: Lead recorded
          content:
            application/json:
              schema:
                type: object
                required: [ok, id]
                properties:
                  ok: { type: boolean }
                  id: { type: string }
        '400': { description: Invalid input }

  /api/listings/featured:
    post:
      tags: [listings]
      summary: Buy a Featured Placement for my listing
      description: >-
        14 or 30 days. Stripe Checkout when configured
        (`{ url, mode: "checkout" }`), otherwise activates immediately
        (`{ ok, mode: "pre_launch", endsAt }`).
      security: [{ bearerAuth: [] }, { cookieAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [listingId, durationDays]
              properties:
                listingId: { type: string }
                durationDays: { type: integer, enum: [14, 30] }
      responses:
        '200':
          description: Checkout URL or immediate activation
          content:
            application/json:
              schema:
                type: object
                required: [mode]
                properties:
                  mode: { type: string, enum: [checkout, pre_launch] }
                  url: { type: string }
                  ok: { type: boolean }
                  endsAt: { type: string, format: date-time }
        '400': { description: Invalid input }
        '401': { description: Unauthenticated }
        '404': { description: Listing not found or not mine }

  /api/listings/verify:
    post:
      tags: [listings]
      summary: Submit my listing for paid verification
      description: >-
        Stripe Checkout when configured (`{ url, mode: "checkout" }`),
        otherwise records the pending submission directly
        (`{ ok, mode: "pre_launch" }`) for the admin queue.
      security: [{ bearerAuth: [] }, { cookieAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [listingId, videoUrl]
              properties:
                listingId: { type: string }
                videoUrl: { type: string, format: uri }
      responses:
        '200':
          description: Checkout URL or recorded submission
          content:
            application/json:
              schema:
                type: object
                required: [mode]
                properties:
                  mode: { type: string, enum: [checkout, pre_launch] }
                  url: { type: string }
                  ok: { type: boolean }
        '400': { description: Invalid input }
        '401': { description: Unauthenticated }
        '404': { description: Listing not found or not mine }
        '409': { description: Already submitted or verified }

  /api/uploads/listing-photo:
    post:
      tags: [uploads]
      summary: Upload one listing photo (native clients)
      description: Single multipart image (max 8 MB) stored via UploadThing; the returned URL goes into listing.photos.
      security: [{ bearerAuth: [] }, { cookieAuth: [] }]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file: { type: string, format: binary }
      responses:
        '200':
          description: Stored
          content:
            application/json:
              schema:
                type: object
                required: [url]
                properties:
                  url: { type: string }
        '400': { description: Missing file }
        '401': { description: Unauthenticated }
        '413': { description: Image too large (max 8MB) }
        '415': { description: Not an image }
        '502': { description: Upload failed }
        '503': { description: Uploads not configured }

  /api/affiliate/{partnerSlug}:
    get:
      tags: [affiliate]
      summary: Affiliate click-through redirector
      description: >-
        Logs the click server-side, then 302-redirects to the partner
        (skyscanner | airalo | getyourguide | battleface). The target URL is
        never echoed to the client.
      parameters:
        - { name: partnerSlug, in: path, required: true, schema: { type: string, enum: [skyscanner, airalo, getyourguide, battleface] } }
        - { name: city, in: query, schema: { type: string } }
        - { name: country, in: query, schema: { type: string } }
        - { name: agreement, in: query, schema: { type: string } }
        - { name: utm_campaign, in: query, schema: { type: string } }
        - { name: q, in: query, schema: { type: string } }
      responses:
        '302': { description: Redirect to the partner site }
        '404': { description: Unknown partner }

  /api/marketing/events:
    post:
      tags: [marketing]
      summary: Record a marketing event
      description: Anonymous first-party attribution event (page, UTM fields, optional metadata). Public.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [eventName]
              properties:
                eventName: { type: string, maxLength: 80 }
                path: { type: string, maxLength: 500 }
                source: { type: string, maxLength: 80 }
                medium: { type: string, maxLength: 80 }
                campaign: { type: string, maxLength: 120 }
                term: { type: string, maxLength: 120 }
                content: { type: string, maxLength: 120 }
                referrer: { type: string, maxLength: 500 }
                metadata: { type: object, additionalProperties: true }
      responses:
        '200':
          description: Recorded
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OkResponse' }
        '400': { description: Invalid input }

  /api/i18n/locale:
    post:
      tags: [i18n]
      summary: Set the UI locale cookie (web)
      description: One-year sticky locale cookie; server components read it before falling back to Accept-Language.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [locale]
              properties:
                locale: { type: string, enum: [en, it, fr, de, es, pt, nl, tr] }
      responses:
        '200':
          description: Cookie set
          content:
            application/json:
              schema:
                type: object
                required: [ok, locale]
                properties:
                  ok: { type: boolean }
                  locale: { type: string }
        '400': { description: Unsupported locale }
