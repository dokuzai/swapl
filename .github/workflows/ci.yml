name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: typecheck + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      # postinstall runs `prisma generate` against the SQLite schema (no VERCEL
      # env here), producing the typed client that typecheck and tests rely on.
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Every public route under app/app/api must be in the OpenAPI contract
      # (or explicitly allowlisted in the script). Fails on drift.
      - name: API contract drift check
        run: pnpm --filter @swapl/api-spec check:drift

      - name: Typecheck (web)
        run: pnpm --filter app typecheck

      - name: Tests (web)
        run: pnpm --filter app test

      - name: Typecheck (marketing)
        run: pnpm --filter marketing typecheck

      # Lint has a pre-existing backlog of errors in real-app files; surface it
      # without blocking merges until that backlog is cleared.
      - name: Lint (non-blocking)
        run: pnpm --filter app lint
        continue-on-error: true
