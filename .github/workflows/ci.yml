name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: typecheck + tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json

      # postinstall runs `prisma generate` against the SQLite schema (no VERCEL
      # env here), producing the typed client that typecheck and tests rely on.
      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Tests
        run: npm test

      # Lint has a pre-existing backlog of errors in real-app files; surface it
      # without blocking merges until that backlog is cleared.
      - name: Lint (non-blocking)
        run: npm run lint
        continue-on-error: true
