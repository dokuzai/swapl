name: Swapl
options:
  bundleIdPrefix: app
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
packages:
  SwaplDesignTokens:
    path: ../packages/design-tokens/build/swift
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
targets:
  Swapl:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Swapl
    dependencies:
      - package: SwaplDesignTokens
    info:
      path: Swapl/Info.plist
      properties:
        CFBundleDisplayName: Swapl
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        # Production backend — the app works standalone, no dev server needed.
        # For local development override via the SWAPL_API_BASE_URL scheme env
        # var (e.g. http://localhost:3000 on the simulator, or the Mac's LAN IP
        # from `ipconfig getifaddr en0` on a physical device).
        SwaplApiBaseURL: "https://app.swapl.fun"
        # Dev on a physical device talks plain http to the Mac's LAN IP;
        # localhost is ATS-exempt by default, the LAN is not.
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        # The design system is light-only (SwaplSemanticLight tokens); without
        # this, dark-mode devices render system text white on cream.
        UIUserInterfaceStyle: Light
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.swapl
        PRODUCT_NAME: Swapl
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_STYLE: Automatic
schemes:
  Swapl:
    build:
      targets:
        Swapl: all
    run:
      config: Debug
      environmentVariables:
        # Enable this (Edit Scheme → Run → Arguments) when running on a
        # physical iPhone: the device cannot reach the Mac's localhost.
        - variable: SWAPL_API_BASE_URL
          value: "http://192.168.1.104:3000"
          isEnabled: false
