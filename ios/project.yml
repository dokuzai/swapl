name: Swapl
options:
  bundleIdPrefix: app
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
packages:
  SwaplDesignTokens:
    path: ../packages/design-tokens/build/swift
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    # Signing lives here, NOT in Xcode: project.pbxproj is regenerated by
    # `xcodegen generate`, so anything set manually in the Xcode UI is wiped.
    DEVELOPMENT_TEAM: 65H83C7GYT
    CODE_SIGN_STYLE: Automatic
targets:
  Swapl:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Swapl
    dependencies:
      - package: SwaplDesignTokens
    info:
      path: Swapl/Info.plist
      properties:
        CFBundleDisplayName: Swapl
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        # Production backend — the app works standalone, no dev server needed.
        # For local development override via the SWAPL_API_BASE_URL scheme env
        # var (e.g. http://localhost:3000 on the simulator, or the Mac's LAN IP
        # from `ipconfig getifaddr en0` on a physical device).
        SwaplApiBaseURL: "https://app.swapl.fun"
        # Dev on a physical device talks plain http to the Mac's LAN IP;
        # localhost is ATS-exempt by default, the LAN is not.
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        # The design system is light-only (SwaplSemanticLight tokens); without
        # this, dark-mode devices render system text white on cream.
        UIUserInterfaceStyle: Light
        # Custom deep-link scheme — swapl://listing/:id, swapl://proposal/:id
        # (push payloads also use the plural forms; see DeepLinkRouter.swift).
        CFBundleURLTypes:
          - CFBundleURLName: app.swapl
            CFBundleURLSchemes:
              - swapl
        # App Store usage descriptions. PhotosPicker (profile/listing photos)
        # runs out-of-process so iOS does not strictly prompt, but the string
        # is declared for App Review clarity and future limited-access flows.
        NSPhotoLibraryUsageDescription: >-
          Swapl uses your photo library so you can add photos of your home to
          your listing and profile.
        # App Intents (CreateListingIntent / OptimizeListingPhotosIntent) are
        # exposed to Siri and Shortcuts.
        NSSiriUsageDescription: >-
          Swapl uses Siri and Shortcuts to let you create a listing or
          optimize your listing photos with your voice.
        # Get Inspired voice input (DOK-148): the mic button on the wish field
        # records audio and Apple's Speech framework transcribes it live —
        # on-device whenever the language model supports it. Audio is never
        # uploaded to Swapl's servers.
        NSMicrophoneUsageDescription: >-
          Swapl uses the microphone so you can dictate the trip you're
          dreaming of instead of typing it.
        NSSpeechRecognitionUsageDescription: >-
          Swapl uses speech recognition to turn your spoken trip wish into
          text, on your device whenever possible. Your audio is never sent
          to Swapl's servers.
        # TestFlight/App Store: only standard HTTPS is used, so the export
        # compliance question is answered once here instead of per-upload.
        ITSAppUsesNonExemptEncryption: false
        # Google sign-in (ASWebAuthenticationSession, no SDK): the iOS OAuth
        # client id from Google Cloud Console. Empty → the Google button is
        # hidden (env-gated like the backend; see GoogleSignInCoordinator).
        # The redirect uses the reversed-client-id scheme, intercepted by
        # ASWebAuthenticationSession — no CFBundleURLTypes entry needed.
        SwaplGoogleOAuthClientID: ""
    # Universal links for https://app.swapl.fun/listings/:id and /swaps/:id.
    # The server side still needs /.well-known/apple-app-site-association on
    # app.swapl.fun before these resolve into the app.
    entitlements:
      path: Swapl/Swapl.entitlements
      properties:
        com.apple.developer.associated-domains:
          - applinks:app.swapl.fun
          # Passkeys (WebAuthn): binds app.swapl bundle credentials to the
          # app.swapl.fun relying party. Requires the AASA file on the domain
          # to list this app under "webcredentials".
          - webcredentials:app.swapl.fun
        # APNs — PushService registers the device token with /api/devices.
        # Xcode rewrites this to "production" when exporting for App Store.
        aps-environment: development
        # Explicit access group for KeychainTokenStore (auth token storage).
        # AppIntents (Siri/Shortcuts) need no entitlement on iOS 16+, so no
        # com.apple.developer.siri here — that one is SiriKit-only.
        keychain-access-groups:
          - $(AppIdentifierPrefix)app.swapl
        # Sign in with Apple (SignInWithAppleButton in LoginView →
        # POST /api/auth/oauth/apple verifies the identity token via JWKS).
        com.apple.developer.applesignin:
          - Default
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.swapl
        PRODUCT_NAME: Swapl
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
  # UI verification harness — drives login + the filter/wishlist flows against
  # a local dev server and saves screenshots (see SwaplUITests/).
  SwaplUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: SwaplUITests
    dependencies:
      - target: Swapl
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.swapl.uitests
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: YES
schemes:
  Swapl:
    build:
      targets:
        Swapl: all
        SwaplUITests: [test]
    test:
      targets:
        - SwaplUITests
    run:
      config: Debug
      environmentVariables:
        # Enable this (Edit Scheme → Run → Arguments) when running on a
        # physical iPhone: the device cannot reach the Mac's localhost.
        - variable: SWAPL_API_BASE_URL
          value: "http://192.168.1.104:3000"
          isEnabled: false
